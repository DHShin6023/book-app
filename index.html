<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>책갈피 AI - 도서 추천</title>
  <meta name="theme-color" content="#5B4636">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>

  <!-- 메인 화면 -->
  <div id="view-main" class="view active">
    <header>
      <h1>📚 책갈피 AI</h1>
      <button id="btn-settings-open" class="icon-btn" aria-label="설정">⚙️</button>
    </header>
    <p class="subtitle">지금 마음에 드는 단어를 3~10개 입력하면<br>어울리는 책을 추천해드려요</p>

    <div class="word-input-row">
      <input id="input-word" type="text" maxlength="20" placeholder="단어 입력 (예: 여행)" autocomplete="off">
      <button id="btn-add-word">추가</button>
    </div>

    <div class="chip-area">
      <div id="chips"></div>
      <span id="word-counter">0/10</span>
    </div>

    <button id="btn-recommend" class="primary-btn" disabled>도서 추천 받기</button>

    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p>AI가 책을 고르는 중...</p>
    </div>

    <div id="error-box" class="hidden"></div>
    <div id="results"></div>
  </div>

  <!-- 설정 화면 -->
  <div id="view-settings" class="view">
    <header>
      <button class="back-btn" data-target="main" aria-label="뒤로">←</button>
      <h1>설정</h1>
    </header>
    <label for="input-api-key">OpenRouter API 키</label>
    <input id="input-api-key" type="password" placeholder="sk-or-v1-..." autocomplete="off">
    <label for="select-model">AI 모델</label>
    <select id="select-model"></select>
    <button id="btn-save-settings" class="primary-btn">저장</button>
    <p class="hint">API 키는 openrouter.ai/keys 에서 발급받을 수 있습니다.<br>키는 이 기기의 브라우저에만 저장되며 외부로 전송되지 않습니다 (OpenRouter 호출 제외).</p>
  </div>

  <div id="toast"></div>

  <script src="logic.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
